{% extends 'base.html' %}
{% block title %}Sign Up - Auth System{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header">
        <h1>Create Account</h1>
        <p class="subtitle">Join us today</p>
    </div>

    <div id="error-message" class="alert alert-error" style="display: none;"></div>
    <div id="success-message" class="alert alert-success" style="display: none;"></div>

    <form id="register-form" onsubmit="registerUser(event)" novalidate>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email" 
                id="email" 
                name="email"
                placeholder="you@example.com" 
                required
                autocomplete="email"
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password"
                placeholder="••••••••" 
                required
                autocomplete="new-password"
                minlength="6"
            >
            <small class="form-hint">Must be at least 6 characters</small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <span class="btn-text">Create Account</span>
            <span class="btn-loading" style="display: none;">Creating...</span>
        </button>
    </form>

    <div class="divider">
        <span>or</span>
    </div>

    <button type="button" class="btn btn-secondary btn-block" onclick="googleLogin()">
        <svg class="oauth-icon" viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
    </button>

    <div class="divider"></div>

    <div class="auth-link">
        Already have an account? <a href="/">Sign in</a>
    </div>
</div>

<script>
async function registerUser(event) {
    event.preventDefault();
    
    const form = document.getElementById("register-form");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("error-message");
    const successDiv = document.getElementById("success-message");
    const submitBtn = form.querySelector('button[type="submit"]');
    const btnText = submitBtn.querySelector(".btn-text");
    const btnLoading = submitBtn.querySelector(".btn-loading");

    // Clear previous messages
    errorDiv.style.display = "none";
    successDiv.style.display = "none";

    // Validate password length
    if (password.length < 6) {
        errorDiv.textContent = "Password must be at least 6 characters.";
        errorDiv.style.display = "block";
        return;
    }

    // Disable button and show loading state
    submitBtn.disabled = true;
    btnText.style.display = "none";
    btnLoading.style.display = "inline";

    try {
        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password
        });

        if (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = "block";
        } else {
            // Check if session exists (no email verification required)
            if (data.session) {
                successDiv.textContent = "Account created successfully! Redirecting...";
                successDiv.style.display = "block";
                setTimeout(() => window.location.href = "/dashboard/", 2000);
            } else {
                // Email verification required
                successDiv.textContent = "Account created! Check your email and confirm your account before logging in.";
                successDiv.style.display = "block";
                // Clear form
                form.reset();
            }
        }
    } catch (err) {
        errorDiv.textContent = "An unexpected error occurred. Please try again.";
        errorDiv.style.display = "block";
    } finally {
        submitBtn.disabled = false;
        btnText.style.display = "inline";
        btnLoading.style.display = "none";
    }
}

async function googleLogin() {
    const errorDiv = document.getElementById("error-message");
    
    try {
        const { data, error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/dashboard/'
            }
        });

        if (error) {
            errorDiv.textContent = "Failed to sign in with Google: " + error.message;
            errorDiv.style.display = "block";
        }
    } catch (err) {
        errorDiv.textContent = "Failed to sign in with Google.";
        errorDiv.style.display = "block";
    }
}
</script>

{% endblock %}
