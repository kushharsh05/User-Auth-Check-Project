{% extends 'base.html' %}
{% block title %}Profile - Auth System{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header">
        <h1>My Profile</h1>
        <p class="subtitle">Manage your account details</p>
    </div>

    {% if message %}
        <div class="alert alert-success">{{ message }}</div>
    {% endif %}

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" id="profile-form" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                value="{{ user.get('username', '') }}"
                placeholder="Enter your username"
            >
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                value="{{ user.get('email', '') }}"
                placeholder="Enter your email"
                disabled
            >
            <small class="form-hint">Email cannot be changed here</small>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 24px;">
            Update Profile
        </button>
    </form>

    <div class="divider"></div>

    <button class="btn btn-secondary btn-block" onclick="window.location.href='/dashboard/'">
        Back to Dashboard
    </button>
</div>

<script>
// Check if user has active session
document.addEventListener('DOMContentLoaded', async function() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    
    if (!session) {
        // No session, redirect to login
        window.location.href = '/login/';
    }
});
</script>

{% endblock %}
