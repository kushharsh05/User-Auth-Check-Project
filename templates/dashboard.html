{% extends 'base.html' %}
{% block title %}Dashboard - Auth System{% endblock %}

{% block content %}

<div class="card">
    <div class="card-header">
        <h1 id="welcome-title">Dashboard</h1>
        <p class="subtitle" id="welcome-subtitle">Welcome back! 👋</p>
    </div>

    <div style="text-align: center; margin: 32px 0;">
        <p style="font-size: 15px; color: #a0a0b8; margin-bottom: 24px;">
            <span id="user-status">Loading...</span>
        </p>
        <div id="user-info" style="background: rgba(168, 85, 247, 0.1); padding: 16px; border-radius: 8px; margin-bottom: 24px; border: 1px solid rgba(168, 85, 247, 0.2);">
            <p style="font-size: 13px; color: #8080a0; margin-bottom: 8px;">Logged in as:</p>
            <p style="font-size: 16px; color: #ffffff; font-weight: 600;" id="user-email">-</p>
        </div>
    </div>

    <div class="divider"></div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button class="btn btn-primary" onclick="goToProfile()">
            View Profile
        </button>
        <button class="btn btn-secondary" onclick="logoutUser()">
            Sign Out
        </button>
    </div>
</div>

<script>
// Load and display user information
document.addEventListener('DOMContentLoaded', async function() {
    try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (!session) {
            // No session, redirect to login
            window.location.href = '/login/';
            return;
        }

        // Display user email
        const userEmail = session.user.email;
        const userName = session.user.user_metadata?.full_name || userEmail.split('@')[0];
        
        document.getElementById('welcome-title').textContent = `Welcome, ${userName}!`;
        document.getElementById('welcome-subtitle').textContent = `Great to see you again 👋`;
        document.getElementById('user-email').textContent = userEmail;
        document.getElementById('user-status').textContent = 'You are successfully logged in.';
        
    } catch (error) {
        console.error('Error loading session:', error);
        document.getElementById('user-status').textContent = 'Error loading user information';
    }
});

function goToProfile() {
    window.location.href = '/profile/';
}

async function logoutUser() {
    try {
        await supabaseClient.auth.signOut();
        window.location.href = '/login/';
    } catch (error) {
        alert('Logout failed: ' + error.message);
    }
}
</script>

{% endblock %}
